name: Benchmark this PR

on:
  pull_request_target:
    branches: [main]
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: "1"
          # Basic suite only (rollouts / training / wrappers). Request a full run with `/bench-full`.
          filter: "rollouts,training,wrappers"
          # Zygote must be loaded for Lux AutoZygote in the training suite.
          extra-pkgs: "ClassicControlEnvironments,Zygote"
          mode: "time,memory"
