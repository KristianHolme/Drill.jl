name: CI
on:
  push:
    # branches:
      # - main
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          # - '1.10'# doesnt support [sources] in project.toml
          - '1'
          # - 'pre' # Disabled until JET.jl supports Julia 1.13+
        os:
          - ubuntu-latest
        arch:
          - x64
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      - name: Restore CondaPkg environment cache (Wandb)
        uses: actions/cache@v6
        with:
          path: .condapkg-ci
          key: condapkg-v2-${{ runner.os }}-${{ matrix.arch }}-julia-${{ matrix.version }}-${{ hashFiles('Project.toml', 'test/Project.toml') }}
          restore-keys: |
            condapkg-v2-${{ runner.os }}-${{ matrix.arch }}-julia-${{ matrix.version }}-
            condapkg-v2-${{ runner.os }}-${{ matrix.arch }}-
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        with:
          coverage: 'false'
          # Manifests are gitignored; without this, CI can resolve outdated compat
          # versions (e.g. DearDiary 0.7 instead of 0.10) and obscure hang causes.
          force_latest_compatible_version: true
        env:
          JULIA_CONDAPKG_ENV: ${{ github.workspace }}/.condapkg-ci/wandb
          # Run test_logging in the next step (serial, live logs). ParallelTestRunner
          # buffers worker stdio until the file finishes, which hides hang markers.
          DRILL_EXCLUDE_TEST_LOGGING: "true"
      - name: Run test_logging (serial, live output)
        # Step-level kill if Wandb/DearDiary hang (Julia Timer cannot interrupt FFI).
        timeout-minutes: 20
        env:
          JULIA_CONDAPKG_ENV: ${{ github.workspace }}/.condapkg-ci/wandb
        run: |
          julia --color=yes --check-bounds=yes --project=test test/test_logging.jl
